<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#FFF0A0;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <!-- Deep gold for outlines -->
    <linearGradient id="deepGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#12122a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060614;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for shield -->
    <clipPath id="shieldClip">
      <path d="M200 28 L340 80 L340 230 Q340 320 200 378 Q60 320 60 230 L60 80 Z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#07071a" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#deepGold)" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner ornaments -->
  <g fill="url(#goldGrad)" opacity="0.8">
    <!-- Top ornament -->
    <polygon points="200,22 207,38 200,34 193,38" />
    <circle cx="200" cy="20" r="4"/>
    <!-- Bottom ornament -->
    <polygon points="200,378 207,362 200,366 193,362" />
    <circle cx="200" cy="380" r="4"/>
    <!-- Left ornament -->
    <polygon points="22,200 38,193 34,200 38,207" />
    <circle cx="20" cy="200" r="4"/>
    <!-- Right ornament -->
    <polygon points="378,200 362,193 366,200 362,207" />
    <circle cx="380" cy="200" r="4"/>
  </g>

  <!-- Shield shape (main emblem body) -->
  <path d="M200 50 L330 95 L330 228 Q330 308 200 362 Q70 308 70 228 L70 95 Z"
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Shield inner border -->
  <path d="M200 65 L318 106 L318 226 Q318 298 200 348 Q82 298 82 226 L82 106 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Decorative horizontal divider lines on shield -->
  <line x1="100" y1="130" x2="300" y2="130" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="133" x2="305" y2="133" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.2"/>
  <line x1="100" y1="285" x2="300" y2="285" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Tiny diamond ornaments on dividers -->
  <polygon points="200,126 205,130 200,134 195,130" fill="url(#goldGrad)"/>
  <polygon points="200,281 205,285 200,289 195,285" fill="url(#goldGrad)"/>
  <polygon points="130,126 134,130 130,134 126,130" fill="url(#goldGrad)" opacity="0.7"/>
  <polygon points="270,126 274,130 270,134 266,130" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- ===== CALLIGRAPHIC "BS" ===== -->
  <!-- Using a highly stylized, hand-lettered approach with SVG paths -->
  <!-- "B" - elegant calligraphic B -->
  <g filter="url(#goldGlow)">
    <!-- B stroke - main vertical stem with thick/thin contrast -->
    <path d="
      M 132 155
      C 129 155 127 157 127 160
      L 127 248
      C 127 251 129 253 132 253
      L 132 155 Z
    " fill="url(#goldGrad)"/>

    <!-- B - thick stem -->
    <rect x="127" y="155" width="14" height="98" rx="3" fill="url(#goldGrad)"/>

    <!-- B - upper bowl -->
    <path d="
      M 141 155
      C 141 155 185 155 185 155
      C 210 155 218 163 218 178
      C 218 193 208 202 192 204
      C 208 205 222 213 222 230
      C 222 247 212 253 188 253
      L 141 253
      Z
    " fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="0"/>

    <!-- B upper bowl filled path -->
    <path d="
      M 141 158
      L 182 158
      C 204 158 214 165 214 178
      C 214 191 204 199 182 199
      L 141 199
      Z
    " fill="url(#goldGrad)"/>

    <!-- B lower bowl filled path -->
    <path d="
      M 141 203
      L 186 203
      C 210 203 218 211 218 226
      C 218 241 208 250 184 250
      L 141 250
      Z
    " fill="url(#goldGrad)"/>

    <!-- B inner cutouts for bowl effect (negative space = dark) -->
    <!-- Upper bowl inner -->
    <path d="
      M 148 163
      L 180 163
      C 198 163 206 169 206 178
      C 206 187 198 194 180 194
      L 148 194
      Z
    " fill="#0a0a1a"/>

    <!-- Lower bowl inner -->
    <path d="
      M 148 208
      L 183 208
      C 203 208 210 214 210 225
      C 210 235 202 245 183 245
      L 148 245
      Z
    " fill="#0a0a1a"/>

    <!-- B calligraphic serif top -->
    <path d="M 119 157 C 123 154 130 153 141 155 L 141 162 C 131 160 124 161 120 163 Z" fill="url(#goldGrad)"/>
    <!-- B calligraphic serif bottom -->
    <path d="M 119 251 C 123 254 130 255 141 253 L 141 246 C 131 248 124 247 120 245 Z" fill="url(#goldGrad)"/>
  </g>

  <!-- "S" - elegant calligraphic S -->
  <g filter="url(#goldGlow)">
    <!-- S main shape - thick calligraphic S -->
    <path d="
      M 268 163
      C 258 157 246 154 233 154
      C 214 154 202 163 202 177
      C 202 190 210 196 232 203
      C 255 210 268 218 268 234
      C 268 250 254 259 234 259
      C 220 259 207 255 196 247
    " fill="none" stroke="url(#goldGrad)" stroke-width="17" stroke-linecap="round"/>

    <!-- S thinner overlay for calligraphic thick/thin -->
    <path d="
      M 265 166
      C 256 159 244 156 233 156
      C 216 156 205 164 205 177
      C 205 188 213 194 234 201
      C 257 208 265 217 265 233
      C 265 248 252 257 234 257
      C 221 257 209 253 199 246
    " fill="none" stroke="url(#deepGold)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

    <!-- S top terminal flourish -->
    <path d="M 268 163 C 273 158 274 153 270 149 C 266 145 260 148 258 152" 
          fill="none" stroke="url(#goldGrad)" stroke-width="9" stroke-linecap="round"/>
    <!-- S bottom terminal flourish -->
    <path d="M 196 247 C 191 252 190 257 194 261 C 198 265 204 262 206 258" 
          fill="none" stroke="url(#goldGrad)" stroke-width="9" stroke-linecap="round"/>

    <!-- Top swash on S -->
    <path d="M 270 149 C 275 144 280 143 278 148" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Bottom swash on S -->
    <path d="M 194 261 C 189 266 184 267 186 262" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Subtle glow behind BS letters -->
  <ellipse cx="195" cy="204" rx="80" ry="60" fill="#FFD700" opacity="0.04" filter="url(#softGlow)"/>

  <!-- "BRITON SCIENCE" text below divider -->
  <g font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <!-- BRITON -->
    <text x="200" y="305"
          font-size="18"
          font-weight="bold"
          fill="url(#goldGrad)"
          letter-spacing="6"
          filter="url(#goldGlow)">BRITON</text>
    <!-- SCIENCE -->
    <text x="200" y="325"
          font-size="18"
          font-weight="bold"
          fill="url(#goldGrad)"
          letter-spacing="4"
          filter="url(#goldGlow)">SCIENCE</text>
  </g>

  <!-- Small decorative dots flanking text -->
  <circle cx="110" cy="314" r="2.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="290" cy="314" r="2.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="118" cy="314" r="1.5" fill="url(#goldGrad)" opacity="0.5"/>
  <circle cx="282" cy="314" r="1.5" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Top shield crown ornament -->
  <g fill="url(#goldGrad)" filter="url(#goldGlow)">
    <polygon points="200,52 204,64 200,61 196,64" opacity="0.9"/>
    <polygon points="188,56 192,67 190,65 186,68" opacity="0.6"/>
    <polygon points="212,56 208,67 210,65 214,68" opacity="0.6"/>
  </g>

  <!-- Fine star sparkles scattered -->
  <g fill="url(#goldGrad)" opacity="0.6">
    <polygon points="162,80 164,85 169,85 165,88 166,93 162,90 158,93 159,88 155,85 160,85" transform="scale(0.6) translate(73,58)"/>
    <polygon points="162,80 164,85 169,85 165,88 166,93 162,90 158,93 159,88 155,85 160,85" transform="scale(0.5) translate(258,60)"/>
  </g>
</svg>
